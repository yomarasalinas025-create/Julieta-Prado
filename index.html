<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2M8EMBZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GF2M8EMBZG');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julieta Prado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 40px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .foto-perfil {
            width: 160px; /* FOTO MÁS GRANDE */
            height: 160px; /* FOTO MÁS GRANDE */
            border-radius: 50%;
            border: 4px solid #ff007f; 
            margin: 0 auto 25px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6); 
        }
        
        h1 { font-size: 28px; margin-bottom: 35px; font-weight: 700; letter-spacing: -0.5px; }
        
        .boton-real {
            display: block;
            width: 100%;
            padding: 20px; /* BOTÓN MÁS GRANDE */
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 21px; /* LETRA MÁS GRANDE */
            font-weight: bold;
            text-decoration: none;
            border-radius: 35px; 
            box-shadow: 0 8px 30px rgba(255, 0, 127, 0.4);
            border: none;
            margin-bottom: 45px;
            cursor: pointer;
            transition: transform 0.2s;
            animation: vibrarRapido 1.2s infinite ease-in-out;
            box-sizing: border-box;
        }
        .boton-real:active { transform: scale(0.98); }

        @keyframes vibrarRapido {
            0% { transform: scale(1); }
            5% { transform: scale(1.05) rotate(-1.5deg); }
            10% { transform: scale(1.05) rotate(1.5deg); }
            15% { transform: scale(1.05) rotate(-1.5deg); }
            20% { transform: scale(1.05) rotate(1.5deg); }
            25% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        
        .redes-contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px; 
        }
        
        .icono {
            color: rgba(255, 255, 255, 0.6);
            font-size: 34px; /* ÍCONOS MÁS GRANDES */
            text-decoration: none;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icono:hover { color: #ff007f; }

        .telegram-animado {
            animation: titilarTelegram 0.6s infinite ease-in-out;
            color: #ff007f;
        }
        @keyframes titilarTelegram {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <a href="/Julieta-Prado/habla-conmigo.html" class="boton-real" id="boton-link">
            💬 Habla conmigo aquí
        </a>

        <div class="redes-contenedor">
            <a class="icono telegram-animado" href="https://t.me/juliprado" target="_blank">
                <i class="fab fa-telegram-plane"></i>
            </a>
            <a class="icono" href="https://www.tiktok.com/@juli.prado03" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>
            <a class="icono" href="https://x.com/juliprado03?s=11" target="_blank">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a class="icono" href="https://www.instagram.com/juprado.of" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        // TRADUCCIÓN DEL BOTÓN (Se mantiene por si entra alguien en otro idioma)
        const idiomaCelular = navigator.language || navigator.userLanguage;
        const textos = {
            es: "💬 Habla conmigo aquí",
            en: "💬 Talk to me here",
            pt: "💬 Fale conmigo aqui"
        };

        let idiomaFinal = 'es';
        if (idiomaCelular.startsWith('en')) idiomaFinal = 'en';
        if (idiomaCelular.startsWith('pt')) idiomaFinal = 'pt';

        document.getElementById('boton-link').innerHTML = textos[idiomaFinal];

        document.getElementById('boton-link').addEventListener('click', function(e) {
            e.preventDefault();
            gtag('event', 'paso3_clic_onlyfans', {
                'event_callback': function() {
                    window.location.href = "/Julieta-Prado/habla-conmigo.html";
                }
            });
            setTimeout(function() {
                window.location.href = "/Julieta-Prado/habla-conmigo.html";
            }, 300);
        });
    </script>

</body>
</html>
