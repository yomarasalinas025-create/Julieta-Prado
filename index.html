<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Privado</title>
    <!-- Librería para TikTok y Telegram -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 35px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .foto-perfil {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 20px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); 
        }
        
        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 15px;
            color: #e2e2e9;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        
        .boton-vip {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 19px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px; 
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.5);
            cursor: pointer;
            border: none;
            margin-bottom: 35px;
            animation: vibrarBoton 3s infinite ease-in-out;
            transition: transform 0.2s;
        }
        
        @keyframes vibrarBoton {
            0% { transform: scale(1); box-shadow: 0 6px 25px rgba(255, 0, 127, 0.5); }
            5% { transform: scale(1.05); box-shadow: 0 6px 30px rgba(255, 0, 127, 0.8); }
            10% { transform: scale(0.98); }
            15% { transform: scale(1.03); }
            20% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .boton-vip:active {
            transform: scale(0.95);
        }

        .redes-contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 10px;
        }
        .icono-red {
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            text-decoration: none;
            transition: color 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
        }
        .icono-red:hover, .icono-red:active {
            color: #ff007f;
            transform: scale(1.15);
        }
        .icono-red:hover svg, .icono-red:active svg {
            fill: #ff007f;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <p>👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇</p>

        <button class="boton-vip" onclick="abrirIndetectable()">
            💬 Habla conmigo aquí
        </button>

        <div class="redes-contenedor">
            <!-- Logo de X (Twitter) vectorial -->
            <a href="https://x.com/juliprado03?s=11" target="_blank" class="icono-red" title="X (Twitter)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="rgba(255, 255, 255, 0.6)" style="transition: fill 0.3s;"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            
            <!-- TikTok -->
            <a href="https://tiktok.com/@gatitajuli0" target="_blank" class="icono-red" title="TikTok">
                <i class="fab fa-tiktok"></i>
            </a>
            
            <!-- Telegram -->
            <a href="https://t.me/juliprado" target="_blank" class="icono-red" title="Telegram">
                <i class="fab fa-telegram-plane"></i>
            </a>
        </div>
    </div>

    <script>
    function abrirIndetectable() {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        var secreto = 'aHR0cHM6Ly9vbmx5ZmFucy5jb20vanVsaXByYWRvMDM='; 
        var urlFinal = atob(secreto);

        // NUEVO MÉTODO DE SALIDA FORZADA TOTAL
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            // Para iOS: Creamos un enlace con target="_blank" y simulamos una petición de sistema para forzar Safari externo
            var windowsClick = window.open(urlFinal, '_blank');
            if(!windowsClick || windowsClick.focus ===  typeof undefined) {
                var disparador = document.createElement('a');
                disparador.href = urlFinal;
                disparador.target = '_blank';
                disparador.rel = 'noopener noreferrer';
                document.body.appendChild(disparador);
                disparador.click();
            }
        } 
        else if (/android/i.test(userAgent)) {
            // Para Android: Forzamos la apertura directa mediante la app nativa de Chrome
            var urlLimpia = urlFinal.replace(/^https?:\/\//, '');
            window.location.href = 'intent://' + urlLimpia + '#Intent;scheme=https;package=com.android.chrome;end';
        } 
        else {
            // Computadoras u otros sistemas
            var win = window.open(urlFinal, '_blank');
            win.focus();
        }
    }
    </script>

</body>
</html>
