<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2M8EMBZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GF2M8EMBZG');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julieta Prado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 35px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .foto-perfil {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 20px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); 
        }
        
        h1 { font-size: 26px; margin-bottom: 15px; font-weight: 700; letter-spacing: -0.5px; }
        p.descripcion { font-size: 14.5px; color: #e2e2e9; margin-bottom: 28px; line-height: 1.5; }
        
        /* BOTÓN CON VIBRACIÓN CONTINUA RÁPIDA */
        .boton-real {
            display: block;
            width: 100%;
            padding: 17px;
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 19px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px; 
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.3);
            border: none;
            margin-bottom: 35px;
            cursor: pointer;
            transition: transform 0.2s;
            animation: vibrarRapido 1.2s infinite ease-in-out;
        }
        .boton-real:active { transform: scale(0.98); }

        @keyframes vibrarRapido {
            0% { transform: scale(1); }
            5% { transform: scale(1.05) rotate(-1.5deg); }
            10% { transform: scale(1.05) rotate(1.5deg); }
            15% { transform: scale(1.05) rotate(-1.5deg); }
            20% { transform: scale(1.05) rotate(1.5deg); }
            25% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        
        .redes-contenedor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px; 
        }
        
        /* ÍCONOS MÁS GRANDES */
        .icono {
            color: rgba(255, 255, 255, 0.6);
            font-size: 28px; 
            text-decoration: none;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icono:hover { color: #ff007f; }

        /* TELEGRAM TITILANDO Y FUCSIA */
        .telegram-animado {
            animation: titilarTelegram 0.6s infinite ease-in-out;
            color: #ff007f;
        }
        @keyframes titilarTelegram {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <p class="descripcion" id="texto-bio">👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇</p>

        <button class="boton-real" id="boton-link">
            💬 Habla conmigo aquí
        </button>

        <div class="redes-contenedor">
            <a class="icono telegram-animado" href="https://t.me/juliprado" target="_blank">
                <i class="fab fa-telegram-plane"></i>
            </a>
            <a class="icono" href="https://www.tiktok.com/@juli.prado03" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>
            <a class="icono" href="https://x.com/juliprado03?s=11" target="_blank">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a class="icono" href="https://www.instagram.com/juprado.of" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        // TRADUCCIÓN AUTOMÁTICA
        const idiomaCelular = navigator.language || navigator.userLanguage;
        const textos = {
            es: {
                bio: "👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇",
                boton: "💬 Habla conmigo aquí"
            },
            en: {
                bio: "👋 I only answer messages here. If you want to know me in a more private way 🔑 or get to know me a little more... click below! 👇",
                boton: "💬 Talk to me here"
            },
            pt: {
                bio: "👋 Só respondo mensagens por aqui. Se você quer me conhecer de uma forma mais privada 🔑 ou me conhecer um pouco mais... clique abaixo! 👇",
                boton: "💬 Fale comigo aqui"
            }
        };

        let idiomaFinal = 'es';
        if (idiomaCelular.startsWith('en')) idiomaFinal = 'en';
        if (idiomaCelular.startsWith('pt')) idiomaFinal = 'pt';

        document.getElementById('texto-bio').innerHTML = textos[idiomaFinal].bio;
        document.getElementById('boton-link').innerHTML = textos[idiomaFinal].boton;

        // APERTURA BLINDADA Y MEDIDOR DE CLIC FINAL (Paso 3)
        document.getElementById('boton-link').addEventListener('click', function() {
            // Registrar evento en Google Analytics antes de abrir
            gtag('event', 'paso3_clic_onlyfans', {
                'event_callback': function() {
                    const codigoSecreto = "aHR0cHM6Ly9vbmx5ZmFucy5jb20vanVsaXByYWRvMDM=";
                    window.open(atob(codigoSecreto), '_blank');
                }
            });
            // Resguardo de apertura rápida
            setTimeout(function() {
                const codigoSecreto = "aHR0cHM6Ly9vbmx5ZmFucy5jb20vanVsaXByYWRvMDM=";
                window.open(atob(codigoSecreto), '_blank');
            }, 400);
        });
    </script>

</body>
</html>
