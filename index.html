<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Privado</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03); 
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        
        /* FOTO DE PERFIL CIRCULAR */
        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff007f; /* Borde Rosa */
            margin: 0 auto 20px auto;
            
            /* LÍNEA 43: PEGA AQUÍ EL LINK DIRECTO DE IMGBB QUE TERMINA EN .JPG */
            background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500'); 
            
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 20px rgba(255, 0, 127, 0.3);
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 15px;
            color: #e0e0e5;
            margin-bottom: 35px;
            line-height: 1.5;
        }
        
        /* EL BOTÓN ROSADO QUE TE GUSTÓ */
        .boton-vip {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #ff007f; /* Tu color Rosado */
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px; /* Bordes bien redondeados */
            box-shadow: 0 5px 20px rgba(255, 0, 127, 0.5);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
        }
        .boton-vip:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(255, 0, 127, 0.2);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado</h1>
        
        <p>Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada o conocerme un poco más, haz clic abajo.</p>

        <button class="boton-vip" onclick="abrirIndetectable()">
            💬 Habla conmigo aquí
        </button>
    </div>

    <script>
    function abrirIndetectable() {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        
        /* TU CÓDIGO RARO DE ONLYFANS DE SIEMPRE */
        var secreto = 'aHR0cHM6Ly9vbmx5ZmFucy5jb20vanVsaXByYWRvMDM='; 
        
        var urlFinal = atob(secreto);

        if (/android/i.test(userAgent)) {
            var urlLimpia = urlFinal.replace(/^https?:\/\//, '');
            window.location.href = 'intent://' + urlLimpia + '#Intent;scheme=https;package=com.android.chrome;end';
        } 
        else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            var disparador = document.createElement('a');
            disparador.href = urlFinal;
            disparador.download = 'secure_gateway';
            document.body.appendChild(disparador);
            disparador.click();
        } 
        else {
            window.location.href = urlFinal;
        }
    }
    </script>

</body>
</html>
