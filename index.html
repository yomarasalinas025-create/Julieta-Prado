<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2M8EMBZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GF2M8EMBZG');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julieta Prado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 40px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-top: 10vh;
            box-sizing: border-box;
        }
        
        .foto-perfil {
            width: 160px; 
            height: 160px; 
            border-radius: 50%;
            border: 4px solid #ff007f; 
            margin: 0 auto 25px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6); 
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 35px; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
        }
        
        @keyframes vibrar-titilar {
            0% { transform: translate(0, 0) scale(1); filter: brightness(1); }
            10% { transform: translate(-1px, 1px) scale(1.01); filter: brightness(1.2); }
            20% { transform: translate(1px, -1px) scale(1); filter: brightness(1); }
            30% { transform: translate(-1px, -1px) scale(1.01); filter: brightness(1.2); }
            40% { transform: translate(1px, 1px) scale(1); filter: brightness(1); }
            50% { transform: translate(0, 0) scale(1.02); box-shadow: 0 8px 35px rgba(255, 0, 127, 0.8); filter: brightness(1.3); }
            60% { transform: translate(-1px, 1px) scale(1); filter: brightness(1); }
            70% { transform: translate(1px, -1px) scale(1.01); filter: brightness(1.2); }
            80% { transform: translate(-1px, -1px) scale(1); filter: brightness(1); }
            90% { transform: translate(1px, 1px) scale(1.01); filter: brightness(1.2); }
            100% { transform: translate(0, 0) scale(1); filter: brightness(1); }
        }

        .btn-principal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 20px; 
            background: #ff007f; 
            color: #ffffff;
            font-size: 18px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 35px; 
            box-shadow: 0 8px 30px rgba(255, 0, 127, 0.5);
            border: none;
            margin-bottom: 40px;
            cursor: pointer;
            animation: vibrar-titilar 1s infinite linear;
            transition: background-color 0.2s;
            box-sizing: border-box;
        }
        
        .btn-principal:active { 
            transform: scale(0.98); 
            animation: none;
        }

        .btn-principal:hover {
            background-color: #e60072;
        }

        .redes-sociales {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 15px;
        }

        .icon-link {
            color: rgba(255, 255, 255, 0.7);
            font-size: 24px;
            text-decoration: none;
            transition: color 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
        }

        .icon-link svg, .icon-link i {
            font-size: 24px;
            width: 24px;
            height: 24px;
        }

        .icon-link:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        .icon-link:active {
            transform: scale(0.95);
        }

        .icon-telegram-canal {
            color: #ff007f;
        }

        .icon-telegram-canal:hover {
            color: #e60072;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <a href="https://t.me/juliprado03" class="btn-principal" target="_blank">
            Envíame un Mensaje 💌
        </a>

        <div class="redes-sociales">
            <a href="https://t.me/juliprado" class="icon-link icon-telegram-canal" target="_blank">
                <i class="fab fa-telegram"></i>
            </a>

            <a href="https://www.tiktok.com/@juli.prado03" class="icon-link" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>

            <a href="https://x.com/juliprado03?s=11" class="icon-link" target="_blank">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>

            <a href="https://www.instagram.com/JulietaPradoOk" class="icon-link" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

</body>
</html>
