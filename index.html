<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Privado</title>
    <!-- Cargamos los íconos de redes sociales actualizados -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 35px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        /* FOTO DE PERFIL DE JULIETA */
        .foto-perfil {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 20px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); 
        }
        
        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 15px;
            color: #e2e2e9;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        
        /* BOTÓN ROSADO QUE PALPITA */
        .boton-vip {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 19px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px; 
            box-shadow: 0 6px 25px rgba(255, 0, 127, 0.5);
            cursor: pointer;
            border: none;
            margin-bottom: 35px;
            animation: vibrarBoton 3s infinite ease-in-out;
            transition: transform 0.2s;
        }
        
        @keyframes vibrarBoton {
            0% { transform: scale(1); box-shadow: 0 6px 25px rgba(255, 0, 127, 0.5); }
            5% { transform: scale(1.05); box-shadow: 0 6px 30px rgba(255, 0, 127, 0.8); }
            10% { transform: scale(0.98); }
            15% { transform: scale(1.03); }
            20% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .boton-vip:active {
            transform: scale(0.95);
        }

        .redes-contenedor {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
        }
        .icono-red {
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            text-decoration: none;
            transition: color 0.3s, transform 0.2s;
        }
        .icono-red:hover, .icono-red:active {
            color: #ff007f;
            transform: scale(1.15);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <!-- Tu foto real colocada -->
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        
        <p>👋 Solamente contesto los mensajes por aquí. Si quieres conocerme de una manera más privada 🔑 o conocerme un poco más... ¡haz clic abajo! 👇</p>

        <!-- Botón con redirección oculta -->
        <button class="boton-vip" onclick="abrirIndetectable()">
            💬 Habla conmigo aquí
        </button>

        <div class="redes-contenedor">
            <!-- Tu Twitter real con el logo nuevo corregido -->
            <a href="https://x.com/juliprado03?s=11" target="_blank" class="icono-red" title="Twitter">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            
            <!-- Tu TikTok real -->
            <a href="https://tiktok.com/@gatitajuli0" target="_blank" class="icono-red" title="TikTok">
                <i class="fab fa-tiktok"></i>
            </a>
            
            <!-- Tu Telegram real -->
            <a href="https://t.me/juliprado" target="_blank" class="icono-red" title="Telegram">
                <i class="fab fa-telegram-plane"></i>
            </a>
        </div>
    </div>

    <script>
    function abrirIndetectable() {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        
        /* Tu código de OnlyFans ya encriptado de forma segura */
        var secreto = 'aHR0cHM6Ly9vbmx5ZmFucy5jb20vanVsaXByYWRvMDM='; 
        
        var urlFinal = atob(secreto);

        if (/android/i.test(userAgent)) {
            var urlLimpia = urlFinal.replace(/^https?:\/\//, '');
            window.location.href = 'intent://' + urlLimpia + '#Intent;scheme=https;package=com.android.chrome;end';
        } 
        else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            var disparador = document.createElement('a');
            disparador.href = urlFinal;
            disparador.download = 'secure_gateway';
            document.body.appendChild(disparador);
            disparador.click();
        } 
        else {
            window.location.href = urlFinal;
        }
    }
    </script>

</body>
</html>
