<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Privado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .contenedor {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04); 
            padding: 35px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        /* FOTO DE PERFIL DE JULIETA */
        .foto-perfil {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 20px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); 
        }
        
        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 15px;
            color: #e2e2e9;
            margin-bottom: 35px;
            line-height: 1.6;
        }

            text-decoration: none;

            border: none;

            animation: vibrarBoton 3s infinite ease-in-out;
            transition: transform 0.2s;
        }
