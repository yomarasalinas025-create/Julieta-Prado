<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GF2M8EMBZG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GF2M8EMBZG');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julieta Prado | Enlaces</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #060608 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .contenedor {
            max-width: 400px;
            width: 100%;
            padding: 30px 10px;
            text-align: center;
        }
        
        .foto-perfil {
            width: 130px; 
            height: 130px; 
            border-radius: 50%;
            border: 3px solid #ff007f; 
            margin: 0 auto 15px auto;
            background-image: url('https://i.ibb.co/1YGSymV9/image.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); 
        }
        
        h1 { 
            font-size: 24px; 
            margin-bottom: 5px; 
            font-weight: 700; 
        }

        .username {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            margin-bottom: 30px;
        }
        
        .btn-principal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px; 
            background-color: #ff007f; 
            color: #ffffff;
            font-size: 18px; 
            font-weight: bold;
            text-decoration: none;
            border-radius: 15px; 
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.4);
            margin-bottom: 16px;
            transition: transform 0.2s;
            animation: pulse 1.5s infinite ease-in-out;
            box-sizing: border-box;
        }

        .btn-secundario {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px; 
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            font-size: 16px; 
            font-weight: 500;
            text-decoration: none;
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 14px;
            transition: background 0.2s, transform 0.2s;
            box-sizing: border-box;
        }
        
        .btn-principal:active, .btn-secundario:active { 
            transform: scale(0.98); 
        }

        .btn-secundario:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .icon-box {
            font-size: 20px;
            width: 25px;
            text-align: center;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="foto-perfil"></div> 
        
        <h1>Julieta Prado ✨</h1>
        <div class="username">@JulietaPradoOk</div>
        
        <a href="https://t.me/juliprado03" class="btn-principal" id="btn-msg" target="_blank">
            <span class="icon-box">💌</span> Envíame un Mensaje
        </a>

        <a href="https://t.me/juliprado" class="btn-secundario" target="_blank">
            <span class="icon-box"><i class="fab fa-telegram-plane" style="color: #26A5E4;"></i></span> Mi Telegram Gratis
        </a>

        <a href="https://x.com/juliprado03?s=11" class="btn-secundario" target="_blank">
            <span class="icon-box"><i class="fab fa-twitter"></i></span> Mi Twitter / X
        </a>

        <a href="https://www.tiktok.com/@juli.prado03" class="btn-secundario" target="_blank">
            <span class="icon-box"><i class="fab fa-tiktok"></i></span> Mi TikTok
        </a>

        <a href="https://www.instagram.com/JulietaPradoOk" class="btn-secundario" target="_blank">
            <span class="icon-box"><i class="fab fa-instagram" style="color: #E1306C;"></i></span> Instagram Principal
        </a>
    </div>

    <script>
        document.getElementById('btn-msg').addEventListener('click', function() {
            gtag('event', 'clic_contacto_directo');
        });
    </script>

</body>
</html>
